services:
  app:
    build: .
    ports:
      - "3002:3002"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_ENABLED=true
      - VITE_AUTH_ENABLED=true
    volumes:
      - ./intelligence:/app/intelligence
    restart: always
